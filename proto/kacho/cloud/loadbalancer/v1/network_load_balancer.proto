syntax = "proto3";

package kacho.cloud.loadbalancer.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/loadbalancer/v1/health_check.proto";
import "kacho/cloud/validation.proto";

option go_package = "github.com/PRO-Robotech/kacho-nlb/proto/gen/go/kacho/cloud/loadbalancer/v1;loadbalancerv1";

// IP version of the addresses that the load balancer works with.
enum IpVersion {
  IP_VERSION_UNSPECIFIED = 0;
  IPV4 = 1;
  IPV6 = 2;
}

// NetworkLoadBalancer — L4 regional load balancer (design §2.2).
message NetworkLoadBalancer {
  // Reserved hot-path / future fields. 8/16/17 are vestigial upstream
  // numbers. 12 (was inline `repeated Listener listeners`) is now reserved
  // because Listener is a standalone resource (see listener.proto) and
  // promoting the field would create a circular proto import. 15
  // (`allow_zonal_shift`) and 18 (`disable_zone_statuses`) перечисляли зоны на
  // публичной поверхности — это per-zone-сигнал (placement), несовместимый с
  // моделью «один anycast VIP скрывает зональную раскладку»; убраны с
  // tenant-facing проекции (инфра-чувствительное — только Internal-проекция).
  // 30-39 are claimed for the future GlobalLoadBalancer composition layer so a
  // single NLB can be lifted into a GLB without renumbering wire-incompatibly.
  reserved 8, 12, 15, 16, 17, 18;
  reserved "listeners", "allow_zonal_shift", "disable_zone_statuses";
  reserved 30 to 39;

  enum Status {
    STATUS_UNSPECIFIED = 0;
    CREATING = 1;
    STARTING = 2;
    ACTIVE = 3;
    STOPPING = 4;
    STOPPED = 5;
    DELETING = 6;
    // No active listeners or attached target groups; no health-checks issued,
    // no traffic forwarded.
    INACTIVE = 7;
  }

  enum Type {
    TYPE_UNSPECIFIED = 0;
    EXTERNAL = 1;
    INTERNAL = 2;
  }

  enum SessionAffinity {
    // Treated as the FIVE_TUPLE default when persisted.
    SESSION_AFFINITY_UNSPECIFIED = 0;
    // 5-tuple affinity (src ip+port, dst ip+port, proto).
    FIVE_TUPLE = 1;
    // Client-IP-only affinity (src ip).
    CLIENT_IP_ONLY = 2;
  }

  string id = 1;

  // ID of the project the NLB belongs to.
  string project_id = 2;

  google.protobuf.Timestamp created_at = 3;
  string name = 4;
  string description = 5;
  map<string, string> labels = 6;

  string region_id = 7;

  Status status = 9;
  Type type = 10;
  SessionAffinity session_affinity = 11;

  // Inline attached target groups snapshot — DEPRECATED. The
  // `attached_target_groups` DB pivot (M:N managed via
  // AttachTargetGroup/DetachTargetGroup RPCs, design §3.2 / §5.2) is the
  // source of truth. Retained for yc-shim JSON-name compatibility.
  repeated AttachedTargetGroup attached_target_groups = 13 [deprecated = true];

  bool deletion_protection = 14;

  // Control-plane intent to spread traffic across targets in all zones of the
  // region. Distribution programming is data-plane (out of control-plane
  // scope). DB default true.
  bool cross_zone_enabled = 19;

  // ID of the VPC network the load balancer's private VIP belongs to. Required
  // for INTERNAL scheme (the VIP is allocated inside this network), rejected
  // for EXTERNAL (its VIP is public, not drawn from a network). Immutable after
  // Create. Cross-service ref to kacho-vpc Network (TEXT, no FK); validated on
  // Create via vpc.NetworkService.Get.
  string network_id = 20;

  // Control-plane intent describing the allowed inbound to the load balancer
  // VIP. Each id references a kacho-vpc SecurityGroup that must exist and belong
  // to the same network_id (same-network invariant). Mutable: Update replaces
  // the whole set via update_mask. Only valid for INTERNAL scheme (SGs live in a
  // network). Cross-service refs to kacho-vpc SecurityGroup (TEXT, no FK);
  // validated on Create/Update via vpc.SecurityGroupService.Get. Traffic
  // filtering itself is data-plane (out of control-plane scope).
  repeated string security_group_ids = 21;

  // Единый anycast VIP сервиса — output-only. Назначается worker'ом после
  // VIP-аллокации; пуст, пока status=CREATING (durable-handle до alloc). Один
  // VIP на LoadBalancer на семейство (single-VIP-per-LB, инвариант на DB-уровне:
  // кардинальность строки + CAS-attach), а не per-Listener. Значения, переданные
  // клиентом в теле Create/Update, игнорируются (адрес назначает только worker).
  string address_v4 = 22;
  string address_v6 = 23;

  // Binding на vpc Address (BYO или auto-аллокация из AnycastAddressPool) —
  // output-only. Cross-service ref на kacho-vpc Address (TEXT, без FK).
  string address_id_v4 = 24;
  string address_id_v6 = 25;

  // Заявленные семейства адресов VIP (одно — single-family, либо оба — dualstack).
  repeated IpVersion ip_families = 26;
}

// AttachedTargetGroup — yc-shim-compat snapshot of a single
// `attached_target_groups` pivot row. Source of truth is the DB pivot
// (design §5.2). Retained solely as the element type for
// NetworkLoadBalancer.attached_target_groups (deprecated field).
message AttachedTargetGroup {
  string target_group_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];

  // Snapshot of HealthCheck configuration from the parent target group at
  // attach time. Source of truth is `target_groups.health_check` (JSONB).
  repeated HealthCheck health_checks = 2 [(size) = "1"];
}

// TargetState — per-target health snapshot returned by
// NetworkLoadBalancerService.GetTargetStates / TargetGroupService.GetTargetStates
// (design §4.6, computed sync). Not a stored entity.
message TargetState {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    INITIAL = 1;
    HEALTHY = 2;
    UNHEALTHY = 3;
    DRAINING = 4;
    INACTIVE = 5;
  }

  string subnet_id = 1;
  string address = 2;
  Status status = 3;
  bool zone_shifted = 4;
}