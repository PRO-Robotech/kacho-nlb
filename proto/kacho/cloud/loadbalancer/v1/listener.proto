syntax = "proto3";

package kacho.cloud.loadbalancer.v1;

import "google/protobuf/timestamp.proto";
import "kacho/cloud/loadbalancer/v1/network_load_balancer.proto";

option go_package = "github.com/PRO-Robotech/kacho-nlb/proto/gen/go/kacho/cloud/loadbalancer/v1;loadbalancerv1";

// Listener is a standalone first-class resource in kacho-nlb (divergence from
// upstream YC where Listener was an inline child of NetworkLoadBalancer).
// Reasons: independent FGA object type `nlb_listener`, independent VIP
// allocation lifecycle, per-Listener operations history, hierarchy tuple
// `nlb_listener#load_balancer@nlb_load_balancer:<lb_id>` (design §6.1).
message Listener {
  // Reserved for future Listener-level extensions (mirror policy, TLS opts,
  // PROXY-protocol variants beyond v2). Numbers 50-59 are claimed up front to
  // keep low numbers contiguous for hot-path fields.
  reserved 50 to 59;

  // Lifecycle status (design §2.3). Distinct from NetworkLoadBalancer.Status —
  // a Listener can be UPDATING while its LB stays ACTIVE.
  enum Status {
    STATUS_UNSPECIFIED = 0;
    CREATING = 1;
    ACTIVE = 2;
    UPDATING = 3;
    DELETING = 4;
  }

  // L4 protocol carried by the listener. Inlined here (and not on the
  // embedded-listener message in network_load_balancer.proto) because the
  // standalone Listener is now the source of truth.
  enum Protocol {
    PROTOCOL_UNSPECIFIED = 0;
    TCP = 1;
    UDP = 2;
  }

  // ID of the listener (prefix `lst`).
  string id = 1;

  // ID of the project that owns the listener. Denormalized from the parent
  // load balancer; kept in sync via Move (design §4.7) so keyset pagination
  // by (project_id, id) can skip a join.
  string project_id = 2;

  // ID of the parent NetworkLoadBalancer (FK `listeners.load_balancer_id`).
  string load_balancer_id = 3;

  // ID of the region. Denormalized from the parent LB; required at the
  // listener row for the `(region_id, allocated_address, port, protocol)`
  // UNIQUE constraint (design §5.2).
  string region_id = 4;

  // Creation timestamp.
  google.protobuf.Timestamp created_at = 5;

  // Name of the listener. Unique per parent load balancer.
  string name = 6;

  // Description.
  string description = 7;

  // Resource labels.
  map<string, string> labels = 8;

  // L4 protocol of the listener.
  Protocol protocol = 9;

  // Port for incoming traffic.
  int64 port = 10;

  // Port on which targets receive forwarded traffic.
  int64 target_port = 11;

  // IP version of the VIP. Shared enum defined in network_load_balancer.proto.
  IpVersion ip_version = 12;

  // BYO `address_id` of a pre-allocated VPC Address; empty when the VIP was
  // auto-allocated. Source of truth lives in kacho-vpc; this field is the
  // soft cross-service reference (design §2.6).
  string address_id = 13;

  // The IP address actually bound to the listener once allocation completes.
  // Empty while `status == CREATING`.
  string allocated_address = 14;

  // For INTERNAL load balancers, the subnet from which the VIP is allocated.
  // Empty for EXTERNAL listeners. Soft cross-service reference to kacho-vpc.
  string subnet_id = 15;

  // Enables PROXY-protocol v2 framing on accepted connections.
  bool proxy_protocol_v2 = 16;

  // Optional target group that receives traffic when no per-listener routing
  // rule matches. Soft reference to a target group attached to the parent LB.
  string default_target_group_id = 17;

  // Current lifecycle status.
  Status status = 18;
}