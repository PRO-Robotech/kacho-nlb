syntax = "proto3";

package kacho.cloud.loadbalancer.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/loadbalancer/v1/listener.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho-nlb/proto/gen/go/kacho/cloud/loadbalancer/v1;loadbalancerv1";

// ListenerService manages Listener resources as a first-class FGA object
// (`nlb_listener`). Diverges from upstream YC AddListener/RemoveListener
// inline pattern (design §3.3, §6.1).
service ListenerService {
  rpc Get(GetListenerRequest) returns (Listener) {
    option (google.api.http) = {get: "/nlb/v1/listeners/{listener_id}"};
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.listeners.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_listener"
      from_request_field: "listener_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc List(ListListenersRequest) returns (ListListenersResponse) {
    option (google.api.http) = {get: "/nlb/v1/listeners"};
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.listeners.list";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    // KAC-229: project-scoped List (parity with NetworkLoadBalancer/TargetGroup
    // List). Listeners carry a denormalized project_id; load_balancer_id is an
    // optional filter. The UI lists listeners at project level (no LB context),
    // so per-LB scoping produced lb_network_load_balancer:* → no-path → 403.
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "project_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Creates a listener under the specified load balancer. VIP allocation
  // (BYO `address_id` or auto via vpc.InternalAddressService) happens in
  // the worker — see design §4.2.
  rpc Create(CreateListenerRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/nlb/v1/listeners"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateListenerMetadata"
      response: "Listener"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.listeners.create";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    // Scope on parent LB rather than project: nlb_listener inherits from
    // nlb_load_balancer (design §6.1).
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Update(UpdateListenerRequest) returns (operation.Operation) {
    option (google.api.http) = {
      patch: "/nlb/v1/listeners/{listener_id}"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateListenerMetadata"
      response: "Listener"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.listeners.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_listener"
      from_request_field: "listener_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Delete(DeleteListenerRequest) returns (operation.Operation) {
    option (google.api.http) = {delete: "/nlb/v1/listeners/{listener_id}"};
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteListenerMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.listeners.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_listener"
      from_request_field: "listener_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc ListOperations(ListListenerOperationsRequest) returns (ListListenerOperationsResponse) {
    option (google.api.http) = {get: "/nlb/v1/listeners/{listener_id}/operations"};
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.listeners.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_listener"
      from_request_field: "listener_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message GetListenerRequest {
  string listener_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];
}

message ListListenersRequest {
  // ID of the project whose listeners are listed (KAC-229: project-scoped,
  // parity with NLB/TG List).
  string project_id = 5 [
    (required) = true,
    (length) = "<=50"
  ];

  // Optional filter: restrict to listeners of a single parent load balancer.
  // Empty = all listeners in the project.
  string load_balancer_id = 1 [(length) = "<=50"];

  int64 page_size = 2 [(value) = "<=1000"];
  string page_token = 3 [(length) = "<=100"];

  // Filter currently supports `name = "..."`.
  string filter = 4 [(length) = "<=1000"];
}

message ListListenersResponse {
  repeated Listener listeners = 1;
  string next_page_token = 2;
}

message CreateListenerRequest {
  // VIP переехал Listener→LoadBalancer: листенер больше не аллоцирует адрес.
  // ip_version=8 и address_spec=9 сняты → reserved (наследует один anycast VIP
  // родительского LB на семейство).
  reserved 8, 9;
  reserved "ip_version", "address_spec";

  string load_balancer_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];

  string name = 2 [(pattern) = "|[a-z][-a-z0-9]{1,61}[a-z0-9]"];
  string description = 3 [(length) = "<=256"];
  map<string, string> labels = 4 [
    (kacho.cloud.size) = "<=64",
    (length) = "<=63",
    (pattern) = "[-_0-9a-z]*",
    (map_key).length = "1-63",
    (map_key).pattern = "[a-z][-_0-9a-z]*"
  ];

  Listener.Protocol protocol = 5 [(required) = true];
  int64 port = 6 [(value) = "1-65535"];
  int64 target_port = 7 [(value) = "1-65535"];

  bool proxy_protocol_v2 = 10;

  // Default target group ID — soft reference to a TG attached to the parent
  // LB. Optional; can be set later via Update.
  string default_target_group_id = 11 [(length) = "<=50"];
}

message CreateListenerMetadata {
  string listener_id = 1;
  string load_balancer_id = 2;
}

message UpdateListenerRequest {
  string listener_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];

  // Immutable fields rejected here: load_balancer_id, protocol, port (design
  // §3.3). Адресных полей у листенера больше нет — address_id/ip_version из
  // immutable-списка ушли вместе с переездом VIP на LoadBalancer.
  google.protobuf.FieldMask update_mask = 2;

  string name = 3 [(pattern) = "|[a-z][-a-z0-9]{1,61}[a-z0-9]"];
  string description = 4 [(length) = "<=256"];
  map<string, string> labels = 5 [
    (kacho.cloud.size) = "<=64",
    (length) = "<=63",
    (pattern) = "[-_0-9a-z]*",
    (map_key).length = "1-63",
    (map_key).pattern = "[a-z][-_0-9a-z]*"
  ];

  bool proxy_protocol_v2 = 6;
  string default_target_group_id = 7 [(length) = "<=50"];
}

message UpdateListenerMetadata {
  string listener_id = 1;
}

message DeleteListenerRequest {
  string listener_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];
}

message DeleteListenerMetadata {
  string listener_id = 1;
  string load_balancer_id = 2;
}

message ListListenerOperationsRequest {
  string listener_id = 1 [
    (required) = true,
    (length) = "<=50"
  ];
  int64 page_size = 2 [(value) = "<=1000"];
  string page_token = 3 [(length) = "<=100"];
}

message ListListenerOperationsResponse {
  repeated operation.Operation operations = 1;
  string next_page_token = 2;
}