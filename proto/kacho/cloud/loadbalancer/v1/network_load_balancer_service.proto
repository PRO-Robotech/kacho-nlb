syntax = "proto3";

package kacho.cloud.loadbalancer.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "kacho/cloud/api/operation.proto";
import "kacho/cloud/validation.proto";
import "kacho/cloud/operation/operation.proto";
import "kacho/cloud/loadbalancer/v1/network_load_balancer.proto";
import "kacho/iam/authz/v1/authz_options.proto";

option go_package = "github.com/PRO-Robotech/kacho-nlb/proto/gen/go/kacho/cloud/loadbalancer/v1;loadbalancerv1";

// NetworkLoadBalancerService — public CRUD + lifecycle for NetworkLoadBalancer.
// Listener mutations now live on the standalone ListenerService (design §3.3);
// per-listener AddListener/RemoveListener and zonal-shift Disable/EnableZones
// were removed (no zonal-shift data plane in kacho-nlb MVP).
service NetworkLoadBalancerService {
  rpc Get(GetNetworkLoadBalancerRequest) returns (NetworkLoadBalancer) {
    option (google.api.http) = {get: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}"};
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.get";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc List(ListNetworkLoadBalancersRequest) returns (ListNetworkLoadBalancersResponse) {
    option (google.api.http) = {get: "/nlb/v1/networkLoadBalancers"};
    // Scope-filtered List: handler фильтрует результат через iam ListObjects
    // (viewer ∪ v_list, per-object), поэтому gateway освобождает RPC от per-RPC
    // Check (<exempt>) — единый project-scope Check отклонил бы viewer'а без
    // отдельного v_list-tuple `no path` 403 ещё до фильтра. authn остаётся (JWT).
    option (kacho.iam.authz.v1.permission) = "<exempt>";
  }

  rpc Create(CreateNetworkLoadBalancerRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/nlb/v1/networkLoadBalancers"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "CreateNetworkLoadBalancerMetadata"
      response: "NetworkLoadBalancer"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.create";
    option (kacho.iam.authz.v1.required_relation) = "editor";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "project"
      from_request_field: "project_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Update(UpdateNetworkLoadBalancerRequest) returns (operation.Operation) {
    option (google.api.http) = {
      patch: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "UpdateNetworkLoadBalancerMetadata"
      response: "NetworkLoadBalancer"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.update";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Delete(DeleteNetworkLoadBalancerRequest) returns (operation.Operation) {
    option (google.api.http) = {delete: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}"};
    option (kacho.cloud.api.operation) = {
      metadata: "DeleteNetworkLoadBalancerMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.delete";
    option (kacho.iam.authz.v1.required_relation) = "v_delete";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Start(StartNetworkLoadBalancerRequest) returns (operation.Operation) {
    option (google.api.http) = {post: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}:start"};
    option (kacho.cloud.api.operation) = {
      metadata: "StartNetworkLoadBalancerMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.start";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc Stop(StopNetworkLoadBalancerRequest) returns (operation.Operation) {
    option (google.api.http) = {post: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}:stop"};
    option (kacho.cloud.api.operation) = {
      metadata: "StopNetworkLoadBalancerMetadata"
      response: "google.protobuf.Empty"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.stop";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // Move the load balancer to another project in the same region (design §4.7).
  // Blocked if any TG is attached; child listeners are repointed in the same
  // worker transaction (denorm sync).
  rpc Move(MoveNetworkLoadBalancerRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}:move"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "MoveNetworkLoadBalancerMetadata"
      response: "NetworkLoadBalancer"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.move";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    // Source-project scope check; destination-project editor check is added
    // by a scope-conditional extractor in kacho-nlb (design §6.5).
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc AttachTargetGroup(AttachNetworkLoadBalancerTargetGroupRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}:attachTargetGroup"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "AttachNetworkLoadBalancerTargetGroupMetadata"
      response: "NetworkLoadBalancer"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.attachTargetGroup";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc DetachTargetGroup(DetachNetworkLoadBalancerTargetGroupRequest) returns (operation.Operation) {
    option (google.api.http) = {
      post: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}:detachTargetGroup"
      body: "*"
    };
    option (kacho.cloud.api.operation) = {
      metadata: "DetachNetworkLoadBalancerTargetGroupMetadata"
      response: "NetworkLoadBalancer"
    };
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.detachTargetGroup";
    option (kacho.iam.authz.v1.required_relation) = "v_update";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  // GetTargetStates — computed deterministic snapshot (design §4.6).
  // REST kept as a sub-resource collection rather than `:getTargetStates`
  // suffix so the underlying object can be cached and conditionally
  // requested independently of the parent NLB.
  rpc GetTargetStates(GetTargetStatesRequest) returns (GetTargetStatesResponse) {
    option (google.api.http) = {get: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}/targetStates"};
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.getTargetStates";
    option (kacho.iam.authz.v1.required_relation) = "v_get";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }

  rpc ListOperations(ListNetworkLoadBalancerOperationsRequest) returns (ListNetworkLoadBalancerOperationsResponse) {
    option (google.api.http) = {get: "/nlb/v1/networkLoadBalancers/{network_load_balancer_id}/operations"};
    option (kacho.iam.authz.v1.permission)        = "loadbalancer.networkLoadBalancers.listOperations";
    option (kacho.iam.authz.v1.required_relation) = "v_list";
    option (kacho.iam.authz.v1.scope_extractor)   = {
      object_type:        "lb_network_load_balancer"
      from_request_field: "network_load_balancer_id"
    };
    option (kacho.iam.authz.v1.required_acr_min)  = "2";
  }
}

message GetNetworkLoadBalancerRequest {
  string network_load_balancer_id = 1 [(length) = "<=50"];
}

message ListNetworkLoadBalancersRequest {
  string project_id = 1 [(required) = true, (length) = "<=50"];
  int64 page_size = 2 [(value) = "<=1000"];
  string page_token = 3 [(length) = "<=100"];
  string filter = 4 [(length) = "<=1000"];
}

message ListNetworkLoadBalancersResponse {
  repeated NetworkLoadBalancer network_load_balancers = 1;
  string next_page_token = 2;
}

message CreateNetworkLoadBalancerRequest {
  // Reserved: 7/8 — прежние inline listener/TG attach at-Create (теперь отдельные
  // RPC). 10 — allow_zonal_shift (снят). 12-16 — снятые поля прежней VIP-модели
  // (cross_zone_enabled/network_id/security_group_ids/address_spec/ip_families).
  reserved 7, 8, 10;
  reserved 12, 13, 14, 15, 16;
  reserved "listener_specs", "attached_target_groups", "allow_zonal_shift";
  reserved "cross_zone_enabled", "network_id", "security_group_ids", "address_spec", "ip_families";

  string project_id = 1 [(required) = true, (length) = "<=50"];

  string name = 2 [(pattern) = "|[a-z][-a-z0-9]{1,61}[a-z0-9]"];
  string description = 3 [(length) = "<=256"];
  map<string, string> labels = 4 [
    (kacho.cloud.size) = "<=64",
    (length) = "<=63",
    (pattern) = "[-_0-9a-z]*",
    (map_key).length = "1-63",
    (map_key).pattern = "[a-z][-_0-9a-z]*"
  ];
  string region_id = 5 [(length) = "<=50"];
  NetworkLoadBalancer.Type type = 6 [(required) = true];

  bool deletion_protection = 9;

  // session_affinity — UNSPECIFIED is accepted and persisted as the FIVE_TUPLE
  // default; FIVE_TUPLE / CLIENT_IP_ONLY are persisted verbatim.
  NetworkLoadBalancer.SessionAffinity session_affinity = 11;

  // placement_type — обязателен и явен для INTERNAL (ZONAL|REGIONAL);
  // запрещён для EXTERNAL.
  NetworkLoadBalancer.PlacementType placement_type = 17;

  // disabled_announce_zones — только для REGIONAL: зоны, из которых anycast-VIP
  // не анонсируется (drain). Каждая зона ∈ регион LB; набор не покрывает все зоны.
  repeated string disabled_announce_zones = 18 [(length) = "<=50"];

  // v4_source / v6_source — per-family источник VIP. Хотя бы одно семейство
  // обязательно. subnet_id ⟹ INTERNAL auto; address_id ⟹ link по kind;
  // public ⟹ EXTERNAL auto.
  VipSource v4_source = 19;
  VipSource v6_source = 20;
}

message CreateNetworkLoadBalancerMetadata {
  string network_load_balancer_id = 1;
}

message UpdateNetworkLoadBalancerRequest {
  // Reserved: 6/7 — прежние inline listener/TG attach. 9 — allow_zonal_shift.
  // 11-16 — снятые mutable/immutable поля прежней VIP-модели (cross_zone_enabled/
  // network_id/security_group_ids/address_id_v4/address_id_v6/ip_families).
  // Immutable-поля (type/placement_type/v4_source/v6_source/region_id/
  // v4_address_id/v6_address_id) в теле не несутся: попытка адресовать их в
  // update_mask отклоняется по имени пути (InvalidArgument), поле не требуется.
  reserved 6, 7, 9;
  reserved 11, 12, 13, 14, 15, 16;
  reserved "listener_specs", "attached_target_groups", "allow_zonal_shift";
  reserved "cross_zone_enabled", "network_id", "security_group_ids", "address_id_v4", "address_id_v6", "ip_families";

  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
  google.protobuf.FieldMask update_mask = 2;
  string name = 3 [(pattern) = "|[a-z][-a-z0-9]{1,61}[a-z0-9]"];
  string description = 4 [(length) = "<=256"];
  map<string, string> labels = 5 [
    (kacho.cloud.size) = "<=64",
    (length) = "<=63",
    (pattern) = "[-_0-9a-z]*",
    (map_key).length = "1-63",
    (map_key).pattern = "[a-z][-_0-9a-z]*"
  ];

  bool deletion_protection = 8;

  // session_affinity — mutable; applied when present in update_mask (or under an
  // empty mask full-PATCH).
  NetworkLoadBalancer.SessionAffinity session_affinity = 10;

  // disabled_announce_zones — mutable (REGIONAL only): drain / re-enable зон.
  // Валидируется по тем же правилам, что Create (зоны ∈ регион, не все зоны).
  repeated string disabled_announce_zones = 17 [(length) = "<=50"];
}

message UpdateNetworkLoadBalancerMetadata {
  string network_load_balancer_id = 1;
}

message DeleteNetworkLoadBalancerRequest {
  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
}

message DeleteNetworkLoadBalancerMetadata {
  string network_load_balancer_id = 1;
}

message StartNetworkLoadBalancerRequest {
  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
}

message StartNetworkLoadBalancerMetadata {
  string network_load_balancer_id = 1;
}

message StopNetworkLoadBalancerRequest {
  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
}

message StopNetworkLoadBalancerMetadata {
  string network_load_balancer_id = 1;
}

message MoveNetworkLoadBalancerRequest {
  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
  // Destination project; must be in the same region as the load balancer.
  string destination_project_id = 2 [(required) = true, (length) = "<=50"];
}

message MoveNetworkLoadBalancerMetadata {
  string network_load_balancer_id = 1;
  string destination_project_id = 2;
}

message AttachNetworkLoadBalancerTargetGroupRequest {
  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
  AttachedTargetGroup attached_target_group = 2 [(required) = true];
}

message AttachNetworkLoadBalancerTargetGroupMetadata {
  string network_load_balancer_id = 1;
  string target_group_id = 2;
}

message DetachNetworkLoadBalancerTargetGroupRequest {
  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
  string target_group_id = 2 [(required) = true, (length) = "<=50"];
}

message DetachNetworkLoadBalancerTargetGroupMetadata {
  string network_load_balancer_id = 1;
  string target_group_id = 2;
}

message ListNetworkLoadBalancerOperationsRequest {
  string network_load_balancer_id = 1 [(required) = true, (length) = "<=50"];
  int64 page_size = 2 [(value) = "<=1000"];
  string page_token = 3 [(length) = "<=100"];
}

message ListNetworkLoadBalancerOperationsResponse {
  repeated operation.Operation operations = 1;
  string next_page_token = 2;
}

message GetTargetStatesRequest {
  string network_load_balancer_id = 1 [(length) = "<=50"];
  string target_group_id = 2 [(length) = "<=50"];
}

message GetTargetStatesResponse {
  repeated TargetState target_states = 1;
}