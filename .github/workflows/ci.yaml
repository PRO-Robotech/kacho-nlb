name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

# kacho-nlb собирается из своего репо; внутренние зависимости (kacho-corelib,
# kacho-compute, kacho-geo, kacho-iam, kacho-vpc) — versioned-модули с GitHub
# (go.mod без replace), поэтому siblings checkout не нужен.

defaults:
  run:
    working-directory: kacho-nlb

jobs:
  build-vet-test:
    name: build + vet + test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-nlb }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-nlb/go.mod, cache-dependency-path: kacho-nlb/go.sum }
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -short -count=1 -timeout 5m ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-nlb }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-nlb/go.mod, cache-dependency-path: kacho-nlb/go.sum }
      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: kacho-nlb
          args: --timeout 5m

  govuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-nlb }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-nlb/go.mod, cache-dependency-path: kacho-nlb/go.sum }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
        continue-on-error: true

  integration:
    name: integration (testcontainers Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-nlb }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-nlb/go.mod, cache-dependency-path: kacho-nlb/go.sum }
      - run: go mod download
      # ВЕСЬ suite БЕЗ -short: testcontainers/concurrency-тесты гардятся
      # `if testing.Short(){ t.Skip }`, поэтому в unit-джобе (-short) они
      # пропускаются. Раньше здесь стоял scope `./internal/repo/...`, из-за чего
      # integration/concurrency-тесты ВНЕ internal/repo (jobs free-ip/target-drain
      # multi-replica exactly-once, operation cancel-CAS, internal-lifecycle
      # semaphore/slots, migrations VIP-uniq self-heal, apps loadbalancer/
      # targetgroup) не гонялись НИГДЕ — false assurance (audit TEST #1). `-p 1`
      # сериализует пакеты, чтобы не плодить параллельные Postgres-контейнеры.
      - run: go test ./... -race -count=1 -timeout 600s -p 1

  helm-render-guard:
    name: helm lint + render guard (deploy chart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-nlb }
      - uses: azure/setup-helm@v4
        with: { version: v3.14.4 }
      # Offline chart render only — no cluster. Asserts peer-edge wiring
      # (vpc/compute/iam/geo) lands in config.yaml + mTLS.
      - run: make helm-lint
      - run: make helm-render-guard
