# ghz job — gRPC-direct smoke against kacho-nlb (mirrors scenarios/smoke.js).
#
# Calls NetworkLoadBalancerService.List with page_size=20 — minimal mutation
# risk, cheapest possible read. Bypasses api-gateway entirely.
#
# Fill in PROJECT_ID + IAM_TOKEN via kustomize patch or `envsubst` before apply:
#   envsubst < smoke-job.yaml | kubectl apply -f -
apiVersion: batch/v1
kind: Job
metadata:
  name: ghz-nlb-smoke
  namespace: kacho
  labels:
    app: ghz
    scenario: smoke
    service: kacho-nlb
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: ghz
        scenario: smoke
    spec:
      restartPolicy: Never
      containers:
        - name: ghz
          image: ghz:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--insecure"
            - "--call"
            - "kacho.cloud.loadbalancer.v1.NetworkLoadBalancerService.List"
            - "--total"
            - "3000"
            - "--rps"
            - "100"
            - "--concurrency"
            - "20"
            - "--connections"
            - "5"
            - "--timeout"
            - "10s"
            - "--metadata"
            - '{"authorization":"Bearer ${IAM_TOKEN}","x-kacho-actor":"ghz-loadtest","x-kacho-project-id":"${PROJECT_ID}"}'
            - "--data"
            - '{"project_id":"${PROJECT_ID}","page_size":20}'
            - "nlb.kacho.svc.cluster.local:9090"
