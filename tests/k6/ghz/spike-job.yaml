# ghz job — gRPC-direct spike against kacho-nlb (mirrors scenarios/spike.js).
#
# Short burst at peak (1500 RPS for 30s). Pair with baseline-job (run before
# and after to characterise recovery). ghz reports min/max/p95/p99 over the
# whole run.
apiVersion: batch/v1
kind: Job
metadata:
  name: ghz-nlb-spike
  namespace: kacho
  labels:
    app: ghz
    scenario: spike
    service: kacho-nlb
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: ghz
        scenario: spike
    spec:
      restartPolicy: Never
      containers:
        - name: ghz
          image: ghz:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--insecure"
            - "--call"
            - "kacho.cloud.loadbalancer.v1.NetworkLoadBalancerService.List"
            - "--total"
            - "45000"
            - "--rps"
            - "1500"
            - "--concurrency"
            - "300"
            - "--connections"
            - "30"
            - "--timeout"
            - "20s"
            - "--metadata"
            - '{"authorization":"Bearer ${IAM_TOKEN}","x-kacho-actor":"ghz-loadtest","x-kacho-project-id":"${PROJECT_ID}"}'
            - "--data"
            - '{"project_id":"${PROJECT_ID}","page_size":20}'
            - "nlb.kacho.svc.cluster.local:9090"
